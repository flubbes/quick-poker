<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Poker</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="/vue.global.js"></script>
    <script src="/socket.io/socket.io.js"></script>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Quick Poker</h1>
        <button class="icon-btn" @click="showSettings = true" title="Settings">&#9881;</button>
      </header>

      <div v-if="rateLimitMsg" class="rate-limit-banner">{{ rateLimitMsg }}</div>

      <main v-if="state" class="lobby">
        <div class="participants">
          <div
            v-for="p in state.participants"
            :key="p.id"
            class="card"
            :class="{ po: p.po, me: p.id === myId }"
          >
            <div class="name">{{ p.name }}{{ p.po ? ' (PO)' : '' }}</div>
            <div class="estimate">
              {{ state.revealed ? (p.estimate ?? '-') : (typeof p.estimate === 'number' ? '✓' :
              (p.estimate ?? '?')) }}
            </div>
          </div>
        </div>

        <div v-if="!isPO" class="actions">
          <button
            v-for="val in [0, 1, 2, 3, 5, 8, 13, 20, 40]"
            :key="val"
            @click="estimate(val)"
            :class="{ selected: myEstimate === val }"
            :disabled="state.revealed"
          >
            {{ val }}
          </button>
        </div>

        <button
          class="reveal-btn"
          @click="state.revealed ? reset() : reveal()"
          :disabled="!state.revealed && !state.canReveal"
        >
          {{ state.revealed ? 'Reset' : 'Reveal' }}
        </button>
      </main>

      <footer>
        <a href="https://github.com/flubbes/quick-poker" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
            ></path>
          </svg>
          GitHub
        </a>
      </footer>

      <div v-if="showSettings" class="modal" @click.self="showSettings = false">
        <div class="modal-content">
          <h2>Settings</h2>
          <label>
            Name (max 15)
            <input v-model="name" maxlength="15" @input="updateName" />
          </label>
          <label class="checkbox-label">
            <input type="checkbox" v-model="po" @change="updatePO" />
            I am Product Owner
          </label>
          <button @click="showSettings = false">Close</button>
        </div>
      </div>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
